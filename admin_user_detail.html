<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GI Admin | Détail User</title>
  <style>
    :root {
      --sidebar: #101828;
      --sidebar-text: #f8fafc;
      --sidebar-muted: #98a2b3;
      --surface: #ffffff;
      --surface-alt: #f8fafc;
      --border: #e4e7ec;
      --text: #101828;
      --muted: #667085;
      --danger: #d92d20;
      --danger-soft: #fee4e2;
      --success: #079455;
      --success-soft: #dcfae6;
      --accent: #175cd3;
      --shadow: 0 20px 50px rgba(16, 24, 40, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(23, 92, 211, 0.10), transparent 26%),
        linear-gradient(180deg, #eef2f6 0%, #f7f9fc 100%);
      min-height: 100vh;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 20%),
        linear-gradient(180deg, #0b1220 0%, #101828 100%);
      color: var(--sidebar-text);
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .brand-badge {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, #175cd3, #0ba5ec);
      display: grid;
      place-items: center;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.08em;
    }

    .brand h1 { margin: 8px 0 0; font-size: 22px; }
    .brand p { margin: 4px 0 0; color: var(--sidebar-muted); }

    .menu-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--sidebar-text);
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      margin-bottom: 10px;
    }

    .menu-link.active {
      background: rgba(23, 92, 211, 0.22);
      border-color: rgba(49, 130, 206, 0.45);
    }

    .content { padding: 28px; display: flex; flex-direction: column; gap: 20px; }

    .hero, .panel {
      background: var(--surface);
      border: 1px solid rgba(16, 24, 40, 0.06);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .hero h2 { margin: 0 0 6px; font-size: 28px; }
    .hero p { margin: 0; color: var(--muted); }

    .panel { padding: 24px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }

    .field label { font-size: 13px; color: var(--muted); font-weight: 600; }

    .control {
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary { background: linear-gradient(135deg, #175cd3, #0ba5ec); color: #fff; }
    .btn-secondary { background: #f2f4f7; color: var(--text); border: 1px solid var(--border); }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      border: 1px solid transparent;
    }

    .pill.info { background: #f2f4f7; color: var(--muted); border-color: var(--border); }
    .pill.success { background: var(--success-soft); color: var(--success); }
    .pill.error { background: var(--danger-soft); color: var(--danger); }

    @media (max-width: 1000px) {
      .layout { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .content { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">GI</div>
        <h1>Admin Console</h1>
        <p>Détail et édition utilisateur.</p>
      </div>

      <a class="menu-link" href="admin_dashboard.html">
        <span>Dashboard</span><span>&rarr;</span>
      </a>
      <a class="menu-link active" href="admin_users.html">
        <span>Utilisateurs</span><span>&bull;</span>
      </a>
      <a class="menu-link" href="admin_properties.html">
        <span>Propriétés</span><span>&rarr;</span>
      </a>
    </aside>

    <main class="content">
      <section class="hero">
        <div>
          <h2>Détail utilisateur</h2>
          <p>Modifiez les informations puis enregistrez pour synchroniser Zoho Creator.</p>
        </div>
        <a href="admin_users.html" class="btn btn-secondary" style="text-decoration:none;display:inline-flex;align-items:center;">&larr; Retour liste</a>
      </section>

      <div class="pill info" id="status">Chargement...</div>

      <section class="panel">
        <form id="userForm">
          <div class="form-grid">
            <div class="field full">
              <label for="userId">ID utilisateur</label>
              <input id="userId" class="control" type="text" readonly>
            </div>

            <div class="field">
              <label for="firstName">Prénom</label>
              <input id="firstName" class="control" type="text" required>
            </div>

            <div class="field">
              <label for="lastName">Nom</label>
              <input id="lastName" class="control" type="text" required>
            </div>

            <div class="field">
              <label for="email">Email</label>
              <input id="email" class="control" type="email" required>
            </div>

            <div class="field">
              <label for="phone">Téléphone</label>
              <input id="phone" class="control" type="text">
            </div>

            <div class="field">
              <label for="role">Rôle</label>
              <select id="role" class="control">
                <option value="User">User</option>
                <option value="Agent">Agent</option>
                <option value="Admin">Admin</option>
              </select>
            </div>

            <div class="field">
              <label for="password">Nouveau mot de passe (optionnel)</label>
              <input id="password" class="control" type="password" placeholder="Laisser vide pour ne pas modifier">
            </div>

            <div class="field">
              <label for="confirmPassword">Confirmer mot de passe</label>
              <input id="confirmPassword" class="control" type="password" placeholder="Même mot de passe">
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
            <button type="button" class="btn btn-secondary" id="reloadBtn">Recharger</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script>
    const els = {
      status: document.getElementById('status'),
      userForm: document.getElementById('userForm'),
      userId: document.getElementById('userId'),
      firstName: document.getElementById('firstName'),
      lastName: document.getElementById('lastName'),
      email: document.getElementById('email'),
      phone: document.getElementById('phone'),
      role: document.getElementById('role'),
      password: document.getElementById('password'),
      confirmPassword: document.getElementById('confirmPassword'),
      reloadBtn: document.getElementById('reloadBtn')
    };

    const userId = new URLSearchParams(window.location.search).get('id') || '';

    function setStatus(message, type) {
      els.status.textContent = message;
      els.status.className = 'pill ' + (type || 'info');
    }

    function normalizeValue(value) {
      if (value == null) return '';
      if (typeof value === 'string' || typeof value === 'number' || typeof value === 'boolean') return String(value);
      if (Array.isArray(value)) return value.map(normalizeValue).filter(Boolean).join(' ');
      if (typeof value === 'object') {
        if (value.display_value) return String(value.display_value);
        if (value.first_name) return (String(value.first_name) + ' ' + String(value.last_name || '')).trim();
      }
      return '';
    }

    function splitName(fullName, raw) {
      const fromObject = raw && typeof raw === 'object' ? raw : null;
      if (fromObject && fromObject.first_name) {
        return {
          firstName: String(fromObject.first_name || ''),
          lastName: String(fromObject.last_name || '')
        };
      }

      const parts = String(fullName || '').trim().split(/\s+/).filter(Boolean);
      return {
        firstName: parts[0] || '',
        lastName: parts.slice(1).join(' ')
      };
    }

    function mapUser(record) {
      const id = normalizeValue(record.ID1 || record.ID || record.User_ID || record.id);
      const fullName = normalizeValue(record.full_name || record.Full_Name || record.Name || record.name);
      const email = normalizeValue(record.Email || record.email);
      const phone = normalizeValue(record.Phone_Number || record.Phone || record.phone || record.phone_number);
      const rawRole = normalizeValue(record.Role || record.User_Role || record.role);
      const roleLower = String(rawRole || '').trim().toLowerCase();
      const role = (function() {
        if (['administrator', 'admin'].includes(roleLower)) return 'Admin';
        if (roleLower === 'agent') return 'Agent';
        if (['owner', 'tenant', 'buyer', 'user', 'client'].includes(roleLower)) return 'User';
        return 'User';
      })();
      const names = splitName(fullName, record.full_name || record.Full_Name);

      return {
        id,
        firstName: names.firstName,
        lastName: names.lastName,
        email,
        phone,
        role
      };
    }

    function fillForm(user) {
      els.userId.value = user.id || '';
      els.firstName.value = user.firstName || '';
      els.lastName.value = user.lastName || '';
      els.email.value = user.email || '';
      els.phone.value = user.phone || '';
      els.role.value = user.role || 'User';
      els.password.value = '';
      els.confirmPassword.value = '';
    }

    async function loadUser() {
      if (!userId) {
        setStatus('ID utilisateur manquant dans l\'URL.', 'error');
        return;
      }

      setStatus('Chargement des données utilisateur...', 'info');
      try {
        const response = await fetch('/api/admin/users/detail/' + encodeURIComponent(userId));
        const payload = await response.json();
        if (!response.ok || payload.success === false) {
          throw new Error(payload.error || 'Impossible de charger les détails utilisateur.');
        }

        fillForm(mapUser(payload.user || {}));
        setStatus('Utilisateur chargé avec succès.', 'success');
      } catch (error) {
        setStatus(error.message, 'error');
      }
    }

    async function saveUser(event) {
      event.preventDefault();

      const password = String(els.password.value || '').trim();
      const confirmPassword = String(els.confirmPassword.value || '').trim();
      if (password || confirmPassword) {
        if (!password || !confirmPassword || password !== confirmPassword) {
          setStatus('Le mot de passe et la confirmation ne correspondent pas.', 'error');
          return;
        }
      }

      const body = {
        ID1: els.userId.value.trim(),
        first_name: els.firstName.value.trim(),
        last_name: els.lastName.value.trim(),
        email: els.email.value.trim(),
        phone_number: els.phone.value.trim(),
        role: els.role.value.trim()
      };

      if (password) {
        body.password = password;
        body.confirm_password = confirmPassword;
      }

      setStatus('Mise à jour en cours...', 'info');
      try {
        const response = await fetch('/api/admin/users/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const payload = await response.json();
        if (!response.ok || payload.success === false) {
          throw new Error(payload.error || 'Mise à jour échouée.');
        }

        setStatus(payload.message || 'Mise à jour réussie.', 'success');
        els.password.value = '';
        els.confirmPassword.value = '';
      } catch (error) {
        setStatus(error.message, 'error');
      }
    }

    els.userForm.addEventListener('submit', saveUser);
    els.reloadBtn.addEventListener('click', loadUser);

    loadUser();
  </script>
</body>
</html>
