<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GI Immo | Annonces</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --sidebar: #2b0f19;
      --sidebar-text: #fff8fb;
      --sidebar-muted: #d2bdc6;
      --surface: #ffffff;
      --surface-alt: #fff8fa;
      --border: #ead8df;
      --text: #2a1219;
      --muted: #7a5d68;
      --accent: #8f1d3a;
      --accent-2: #d14b5e;
      --shadow: 0 20px 50px rgba(42, 18, 25, 0.1);
    }

    /* Override listing card styling */
    .listings {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      padding: 20px 0;
    }

    .listing-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .listing-card:hover {
      box-shadow: 0 24px 60px rgba(42, 18, 25, 0.15);
      transform: translateY(-4px);
      border-color: var(--accent);
    }

    .listing-img {
      height: 200px;
      background: linear-gradient(135deg, #f3d7df 0%, #eac4d0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      position: relative;
      overflow: hidden;
    }

    .listing-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .listing-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .listing-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .listing-details {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .listing-detail {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    .listing-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      margin: 8px 0;
      margin-top: auto;
    }

    .cta-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      display: inline-block;
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(143, 29, 58, 0.3);
    }
  </style>
</head>
<body>

  <nav class="nav">
    <h1 class="nav-logo">GI Immobilier</h1>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Accueil</a>
      <a href="annonces.html" class="nav-link" style="color:#f8d7de;font-weight:700;">Annonces</a>
      <a href="apropos.html" class="nav-link">À propos</a>
      <a href="contact.html" class="nav-link">Contact</a>
    </div>
    <a href="login.html" class="nav-btn">Connexion</a>
  </nav>

  <section class="hero" style="background:linear-gradient(180deg, #3a131f 0%, #2b0f19 100%);text-align:center;padding:40px 24px">
    <h2 style="font-size:32px;color:#fff;margin:0 0 12px">Annonces Immobilières</h2>
    <p style="color:#f8d7de;margin:0 0 24px">Découvrez tous les biens à la location ou à la vente</p>
  </section>

  <div style="padding:24px;max-width:1400px;margin:0 auto">
    <div class="filters" style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:30px">
      <input class="search-input" type="text" id="searchInput" placeholder="Ville, quartier..." style="flex:1;min-width:200px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px">
      <button class="search-btn" style="padding:10px 20px;background:linear-gradient(135deg, var(--accent), var(--accent-2));color:#fff;border:0;border-radius:8px;cursor:pointer;font-weight:600;transition:all 0.3s">Rechercher</button>
      <button class="filter-chip active" data-filter="all" style="padding:10px 14px;border:1px solid var(--border);background:var(--accent);color:#fff;border-radius:8px;cursor:pointer;font-weight:600">Tous</button>
      <button class="filter-chip" data-filter="courte" style="padding:10px 14px;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-weight:600">Courte durée</button>
      <button class="filter-chip" data-filter="longue" style="padding:10px 14px;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-weight:600">Longue durée</button>
      <button class="filter-chip" data-filter="achat" style="padding:10px 14px;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-weight:600">Achat</button>
    </div>

    <section class="listings" id="listingsContainer">
      <p style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px">Chargement des annonces...</p>
    </section>

    <div id="paginationControls" style="text-align:center;margin:30px 0;display:flex;justify-content:center;gap:12px;flex-wrap:wrap"></div>
  </div>

  <footer class="footer">
    <div>
      <span class="footer-logo">GI Immobilier</span>
      <p style="font-size: 12px; color: var(--gray-500); margin-top: 8px;">La meilleure plateforme immobilière de Tunisie</p>
    </div>
    <nav class="footer-links">
      <a href="contact.html" class="footer-link">Contact</a>
      <a href="#" class="footer-link">Conditions d'utilisation</a>
      <a href="#" class="footer-link">Politique de confidentialité</a>
    </nav>
  </footer>

  <script src="auth-helper.js"></script>
  <script src="annonces.js"></script>
</body>
</html>
